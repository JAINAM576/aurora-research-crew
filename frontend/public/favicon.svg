<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Shifting Aurora Gradient -->
    <linearGradient id="aurora-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A853" />
      <stop offset="50%" stop-color="#F5C26B" />
      <stop offset="100%" stop-color="#A5C79E" />
    </linearGradient>
  </defs>
  <!-- Circular glowing background -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="url(#aurora-grad)" stroke-width="2.5" />
  <!-- Stylized connected nodes representing the agent crew -->
  <circle cx="16" cy="9" r="2.5" fill="#D4A853" />
  <circle cx="10" cy="20" r="2.5" fill="#F5C26B" />
  <circle cx="22" cy="20" r="2.5" fill="#A5C79E" />
  <!-- Connection lines -->
  <path d="M 16 11.5 L 11.5 18.5" stroke="#D4A853" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />
  <path d="M 16 11.5 L 20.5 18.5" stroke="#A5C79E" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />
  <path d="M 12.5 20 L 19.5 20" stroke="#F5C26B" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />
</svg>